<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="style.css" />
    <style>
      header,
      footer,
      #content {
        padding: 4px;
        margin: 2px;
        border: 5px solid blueviolet;
        background-color: #d3eafd;
      }

      #content > div,
      #side-menu section {
        padding: 4px;
        margin: 2px;
        border: 2px solid red;
      }

      #content {
        flex: 1;
        display: flex;
        flex-direction: row;
      }

      #side-menu {
        flex: 1;
      }

      #main {
        flex: 2;
      }

      #side-menu section {
        border-color: green;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Header</h1>
      <p>Hello</p>
    </header>
    <section id="content">
      <div id="side-menu">
        <section>M1</section>
        <section>M2</section>
      </div>
      <div id="main">main</div>
    </section>
    <footer>F</footer>
  </body>
</html>
